<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432" role="img" aria-labelledby="title desc">
  <title id="title">Ace Domain Android adaptive icon background</title>
  <desc id="desc">Deep blue connected-domain background layer for Android adaptive icon exports.</desc>
  <defs>
    <linearGradient id="adaptiveBase" x1="64" x2="368" y1="40" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset=".46" stop-color="#061735"/>
      <stop offset="1" stop-color="#020712"/>
    </linearGradient>
    <radialGradient id="adaptiveGlow" cx="0" cy="0" r="1" gradientTransform="matrix(0 220 -220 0 302 110)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00B2FF" stop-opacity=".42"/>
      <stop offset=".58" stop-color="#0D47FF" stop-opacity=".14"/>
      <stop offset="1" stop-color="#020712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="432" height="432" fill="url(#adaptiveBase)"/>
  <rect width="432" height="432" fill="url(#adaptiveGlow)"/>
  <g fill="none" stroke="#00B2FF" stroke-opacity=".28" stroke-width="1.4">
    <path d="M45 284 138 218 214 252 302 164 388 198"/>
    <path d="M84 92 154 142 238 116 334 72"/>
    <path d="M72 354 188 314 284 348 368 298"/>
  </g>
  <g fill="#00F0FF">
    <circle cx="45" cy="284" r="4" opacity=".75"/>
    <circle cx="138" cy="218" r="5" opacity=".85"/>
    <circle cx="214" cy="252" r="4" opacity=".65"/>
    <circle cx="302" cy="164" r="6" opacity=".95"/>
    <circle cx="388" cy="198" r="4" opacity=".7"/>
    <circle cx="154" cy="142" r="4" opacity=".7"/>
    <circle cx="334" cy="72" r="5" opacity=".9"/>
    <circle cx="284" cy="348" r="5" opacity=".75"/>
  </g>
</svg>
